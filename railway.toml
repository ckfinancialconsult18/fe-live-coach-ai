[build]
# Use Dockerfile for reproducible builds
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start the custom Node.js server (required for WebSocket support)
startCommand = "node_modules/.bin/tsx server.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
# Ensure NODE_ENV is set at runtime
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
